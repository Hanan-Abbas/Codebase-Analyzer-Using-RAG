<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoMind AI | Professional</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        .prose p {
            margin-bottom: 1rem;
            line-height: 1.6;
            color: #cbd5e1
        }

        .prose strong {
            color: #22d3ee;
            font-weight: 600
        }

        .chat-scroll::-webkit-scrollbar {
            width: 5px
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px
        }

        #progressContainer {
            width: 300px;
            height: 4px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            margin-top: 15px
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: #22d3ee;
            transition: width .3s ease
        }

        .recent-tag {
            cursor: pointer;
            transition: .2s
        }

        .recent-tag:hover {
            background: #334155;
            color: #22d3ee
        }

        #emptyState {
            transition: opacity 1s ease, transform 1s ease, filter 1s ease;
            opacity: 1
        }

        .fade-out {
            opacity: 0 !important;
            filter: blur(8px);
            transform: scale(.95);
            pointer-events: none
        }
    </style>
</head>
