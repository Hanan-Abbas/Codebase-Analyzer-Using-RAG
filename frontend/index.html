<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoMind AI | Professional</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        .prose p {
            margin-bottom: 1rem;
            line-height: 1.6;
            color: #cbd5e1
        }

        .prose strong {
            color: #22d3ee;
            font-weight: 600
        }

        .chat-scroll::-webkit-scrollbar {
            width: 5px
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px
        }

        #progressContainer {
            width: 300px;
            height: 4px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            margin-top: 15px
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: #22d3ee;
            transition: width .3s ease
        }

        .recent-tag {
            cursor: pointer;
            transition: .2s
        }

        .recent-tag:hover {
            background: #334155;
            color: #22d3ee
        }

        #emptyState {
            transition: opacity 1s ease, transform 1s ease, filter 1s ease;
            opacity: 1
        }

        .fade-out {
            opacity: 0 !important;
            filter: blur(8px);
            transform: scale(.95);
            pointer-events: none
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 h-screen flex flex-col overflow-hidden">


    <header
        class="border-b border-slate-800 p-4 flex justify-between items-center bg-slate-900/80 backdrop-blur-md z-20">

        <div class="flex items-center gap-3">
            <span class="text-2xl">🧠</span>
            <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                RepoMind Engine
            </h1>
        </div>

        <div class="flex gap-2">

            <input id="repoUrl" type="text" placeholder="Paste GitHub URL..."
                class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm w-80 focus:ring-2 focus:ring-cyan-500 outline-none transition-all"
                onkeydown="if(event.key==='Enter'){event.preventDefault(); ingestRepo(event);}">

            <button id="analyzeBtn" type="button" onclick="ingestRepo(event)"
                class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded-lg text-sm font-bold transition-all active:scale-95">
                Analyze
            </button>

        </div>
    </header>
    <main id="chatWindow" class="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll relative">

        <div id="emptyState" class="absolute inset-0 flex flex-col justify-center items-center text-center p-4 z-0">

            <p id="statusLine" class="text-slate-500 text-lg italic transition-all duration-500">
                Connect a repository to start exploring the codebase...
            </p><div id="progressContainer">
                <div id="progressBar"></div>
            </div>

            <div id="recentSection" class="mt-8">

                <p class="text-xs uppercase tracking-widest text-slate-600 mb-3">
                    Recent Codebases
                </p>

                <div id="recentList" class="flex flex-wrap justify-center gap-2 max-w-md"></div>

            </div>

        </div>

    </main>
