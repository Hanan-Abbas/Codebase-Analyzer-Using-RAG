<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoMind AI | Professional</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        .prose p {
            margin-bottom: 1rem;
            line-height: 1.6;
            color: #cbd5e1
        }

        .prose strong {
            color: #22d3ee;
            font-weight: 600
        }

        .chat-scroll::-webkit-scrollbar {
            width: 5px
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px
        }

        #progressContainer {
            width: 300px;
            height: 4px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            margin-top: 15px
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: #22d3ee;
            transition: width .3s ease
        }

        .recent-tag {
            cursor: pointer;
            transition: .2s
        }

        .recent-tag:hover {
            background: #334155;
            color: #22d3ee
        }

        #emptyState {
            transition: opacity 1s ease, transform 1s ease, filter 1s ease;
            opacity: 1
        }

        .fade-out {
            opacity: 0 !important;
            filter: blur(8px);
            transform: scale(.95);
            pointer-events: none
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 h-screen flex flex-col overflow-hidden">


    <header
        class="border-b border-slate-800 p-4 flex justify-between items-center bg-slate-900/80 backdrop-blur-md z-20">

        <div class="flex items-center gap-3">
            <span class="text-2xl">🧠</span>
            <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                RepoMind Engine
            </h1>
        </div>

        <div class="flex gap-2">

            <input id="repoUrl" type="text" placeholder="Paste GitHub URL..."
                class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm w-80 focus:ring-2 focus:ring-cyan-500 outline-none transition-all"
                onkeydown="if(event.key==='Enter'){event.preventDefault(); ingestRepo(event);}">

            <button id="analyzeBtn" type="button" onclick="ingestRepo(event)"
                class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded-lg text-sm font-bold transition-all active:scale-95">
                Analyze
            </button>

        </div>
    </header>
    <main id="chatWindow" class="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll relative">

        <div id="emptyState" class="absolute inset-0 flex flex-col justify-center items-center text-center p-4 z-0">

            <p id="statusLine" class="text-slate-500 text-lg italic transition-all duration-500">
                Connect a repository to start exploring the codebase...
            </p>
            <div id="progressContainer">
                <div id="progressBar"></div>
            </div>

            <div id="recentSection" class="mt-8">

                <p class="text-xs uppercase tracking-widest text-slate-600 mb-3">
                    Recent Codebases
                </p>

                <div id="recentList" class="flex flex-wrap justify-center gap-2 max-w-md"></div>

            </div>

        </div>

    </main>
    <footer class="p-6 border-t border-slate-800 bg-slate-900/50 z-10">

        <div class="max-w-4xl mx-auto relative">

            <input id="userInput" type="text" placeholder="Ask about functions, architecture, or files..."
                class="w-full bg-slate-800 border border-slate-700 rounded-xl px-5 py-4 pr-16 focus:ring-2 focus:ring-cyan-500 outline-none shadow-2xl"
                onkeydown="if(event.key==='Enter'){event.preventDefault(); sendChat();}">

            <button type="button" onclick="sendChat()"
                class="absolute right-3 top-3 bg-cyan-600 p-2 rounded-lg hover:bg-cyan-500 transition-colors">

                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />

                </svg>

            </button>

        </div>

    </footer>
    <script>

        const API_BASE = "http://localhost:8000"

        let uiLocked = false
        const uiState = { isChatting: false }



        window.onload = () => { updateRecentUI() }


        function updateRecentUI() {

            const list = JSON.parse(localStorage.getItem('recentRepos') || '[]')

            const container = document.getElementById('recentList')

            if (!container) return

            container.innerHTML = list.length ? '' : '<span class="text-slate-700 text-xs italic">No history yet</span>'


            list.forEach(url => {

                const name = url.split('/').pop().replace('.git', '')

                const div = document.createElement('div')

                div.className = "recent-tag bg-slate-800 border border-slate-700 px-3 py-1 rounded-full text-xs text-slate-400 hover:bg-slate-700 hover:text-cyan-400 transition-all"

                div.innerText = name

                div.onclick = (e) => {
                    e.preventDefault()
                    document.getElementById('repoUrl').value = url
                    ingestRepo(e)
                }

                container.appendChild(div)

            })

        }


        function saveToRecent(url) {

            let list = JSON.parse(localStorage.getItem('recentRepos') || '[]')

            list = list.filter(item => item !== url)

            list.unshift(url)

            if (list.length > 5) list.pop()

            localStorage.setItem('recentRepos', JSON.stringify(list))

            updateRecentUI()

        }



        async function ingestRepo(event) {

            if (event) event.preventDefault()

            const url = document.getElementById('repoUrl').value
            const statusLine = document.getElementById('statusLine')
            const btn = document.getElementById('analyzeBtn')
            const progBar = document.getElementById('progressBar')
            const progContainer = document.getElementById('progressContainer')

            if (!url) return


            const repoName = url.split('/').pop().replace('.git', '')

            btn.disabled = true
            progContainer.style.display = 'block'
            progBar.style.width = '10%'

            statusLine.innerHTML = `<span class="animate-pulse text-cyan-400">⏳ Indexing ${repoName}...</span>`


            let progress = 10

            let progInterval = setInterval(() => {

                if (progress < 90) {
                    progress += 1
                    progBar.style.width = progress + "%"
                }

            }, 300)



            try {

                const res = await fetch(`${API_BASE}/ingest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                })

                if (!res.ok) {
                    const errText = await res.text().catch(() => "")
                    throw new Error(`HTTP ${res.status} ${res.statusText}${errText ? ` — ${errText}` : ""}`)
                }

                clearInterval(progInterval)
                progBar.style.width = '100%'

                statusLine.innerHTML =
                    `✅ Successfully connected to <span class="text-cyan-400 font-bold">${repoName}</span>
<br>
<span class="text-sm text-slate-600 font-normal">Ready to chat!</span>`

                saveToRecent(url)

                setTimeout(() => {
                    progContainer.style.display = 'none'
                }, 1000)

            }

            catch (e) {

                clearInterval(progInterval)
                const details = (e && e.message) ? e.message : String(e)

                statusLine.innerHTML = `<span class="text-red-400">❌ Connection Failed</span><div class="text-xs text-slate-500 mt-2 max-w-md break-words">${details}</div>`

                progContainer.style.display = 'none'

            }

            finally {
                btn.disabled = false
            }

        }



        const feedbackStore = {}


        async function sendChat() {

            const input = document.getElementById('userInput')
            const prompt = input.value
            const emptyState = document.getElementById('emptyState')

            if (!prompt) return


            if (!uiState.isChatting) {

                uiState.isChatting = true

                if (emptyState) {

                    emptyState.classList.add('fade-out')

                    setTimeout(() => {
                        emptyState.style.display = 'none'
                    }, 1000)

                }

            }


            appendMessage("User", prompt, false)

            input.value = ''


            try {

                const res = await fetch(`${API_BASE}/chat`, {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })

                })

                const data = await res.json()

                appendMessage("RepoMind", data.answer, true, prompt)

            }

            catch {

                appendMessage("RepoMind", "⚠️ Error: Backend unreachable.", true)

            }

        }

        function appendMessage(sender, rawText, isAi = false, originalPrompt = null) {

            const win = document.getElementById('chatWindow')
            const wrapper = document.createElement('div')

            wrapper.className = isAi ? "flex flex-col items-start w-full" : "flex flex-col items-end w-full"

            const content = isAi ? marked.parse(rawText) : rawText

            let feedbackHtml = ""

            if (isAi) {
                const feedbackId = `fb_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`
                feedbackStore[feedbackId] = {
                    question: originalPrompt || "",
                    answer: rawText,
                    rated: false
                }

                feedbackHtml = `
                    <div class="mt-3 flex items-center gap-2 text-xs text-slate-500">
                        <span>Was this helpful?</span>
                        <button class="px-2 py-1 rounded-full bg-slate-700 hover:bg-slate-600"
                                onclick="sendFeedback('${feedbackId}', 1, this)">👍 Yes</button>
                        <button class="px-2 py-1 rounded-full bg-slate-700 hover:bg-slate-600"
                                onclick="sendFeedback('${feedbackId}', 0, this)">👎 No</button>
                    </div>
                `
            }

            wrapper.innerHTML = `
<div class="mb-4 ${isAi ? 'mr-auto' : 'ml-auto'} relative z-10">
  <span class="text-xs font-bold mb-1 uppercase tracking-widest ${isAi ? 'text-cyan-500' : 'text-slate-400'} block px-1">
    ${sender}
  </span>
  <div class="${isAi ? 'bg-slate-800 border border-slate-700 prose max-w-3xl' : 'bg-cyan-700 text-white max-w-xl'} p-5 rounded-2xl shadow-lg">
    ${content}
    ${feedbackHtml}
  </div>
</div>
`

            win.appendChild(wrapper)
            win.scrollTop = win.scrollHeight

            if (isAi) Prism.highlightAllUnder(wrapper)
        }
